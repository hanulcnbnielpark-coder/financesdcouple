<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>한울씨앤비 표준견적</title>
  <link rel="stylesheet" href="./app.css">
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="./hanul-logo.png" alt="한울씨앤비 로고">
        <div>
          <strong>한울 표준견적</strong>
          <span>HANUL C&amp;B</span>
        </div>
      </div>

      <nav class="side-nav" aria-label="주 메뉴">
        <button class="nav-item active" data-page="estimate">
          <span class="nav-icon"></span><span>새 견적 작성</span>
        </button>
        <button class="nav-item" data-page="projects">
          <span class="nav-icon"></span><span>견적 프로젝트</span>
        </button>
        <div class="nav-section">STANDARD DATA</div>
        <button class="nav-item" data-page="trades">
          <span class="nav-icon"></span><span>표준 공종 관리</span>
        </button>
        <button class="nav-item" data-page="prices">
          <span class="nav-icon"></span><span>기준 단가 관리</span>
        </button>
        <button class="nav-item" data-page="rules">
          <span class="nav-icon"></span><span>산정 규칙 관리</span>
        </button>
        <div class="nav-section">DATA &amp; INSIGHT</div>
        <button class="nav-item" data-page="history">
          <span class="nav-icon"></span><span>견적 이력 DB</span>
        </button>
        <button class="nav-item" data-page="reports">
          <span class="nav-icon"></span><span>분석 리포트</span>
        </button>
      </nav>

      <div class="sidebar-foot">
        <div class="db-row"><span>표준 DB</span><strong>v0.2</strong></div>
        <div class="db-row"><span>대분류</span><strong>7개</strong></div>
        <div class="db-row"><span>세부 공종</span><strong>155개</strong></div>
        <small>기준일 2026.04.29</small>
      </div>
    </aside>

    <section class="app-main">
      <header class="topbar">
        <button class="mobile-menu-button" id="mobileMenu" aria-label="메뉴 열기">
          <img src="./hanul-logo.png" alt=""> 메뉴
        </button>
        <div>
          <div class="eyebrow" id="pageEyebrow">ESTIMATE WORKSPACE</div>
          <h1 id="pageTitle">새 표준 견적 작성</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="quickSave" title="현재 상태 저장">저장</button>
          <div class="sync-state"><i></i> 로컬 DB 연결</div>
          <div class="profile">
            <span class="profile-avatar">NP</span>
            <div><strong>전략기획팀</strong><small>관리자</small></div>
          </div>
        </div>
      </header>

      <main id="content" class="content"></main>
    </section>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <section class="modal-panel" id="modalPanel" role="dialog" aria-modal="true"></section>
  </div>

  <div class="toast" id="toast"></div>

  <section class="print-stage" id="printStage" aria-hidden="true">
    <div class="print-toolbar">
      <div>
        <strong>견적서 출력 미리보기</strong>
        <span>인쇄 창에서 PDF로 저장할 수 있습니다.</span>
      </div>
      <div>
        <button class="button secondary" id="closePrint">닫기</button>
        <button class="button primary" id="doPrint">인쇄 / PDF 저장</button>
      </div>
    </div>
    <article id="quoteDocument" class="quote-document"></article>
  </section>
</body>
</html>
